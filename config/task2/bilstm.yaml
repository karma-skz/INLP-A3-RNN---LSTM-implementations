seed: 42

data:
  plain_path: data/plain.txt
  val_ratio: 0.1
  test_ratio: 0.1
  min_freq: 1
  mask_prob: 0.15

model:
  emb_dim: 192
  hidden_dim: 192
  num_layers: 2
  dropout: 0.2
  tie_embeddings: true
  max_len:

train:
  batch_size: 64
  epochs: 8
  lr: 0.0005
  weight_decay: 0.01
  grad_clip: 1.0
  use_cuda: true

checkpoint:
  source: local
  local_path: outputs/checkpoints/task2_bilstm.pt
  push_to_hf: true
  repo_id: "karma-skz/inlp-assignment3-models"
  hf_filename: task2_bilstm.pt

paths:
  results_dir: outputs/results

wandb:
  enabled: true
  project: inlp-a3
  run_name: task2_bilstm
  dir: outputs/wandb
